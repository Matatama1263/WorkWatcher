name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # v1.0.0, v1.0.1 같은 태그에 반응
  workflow_dispatch:  # 수동 실행 가능

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore WorkWatcher/WorkWatcher.csproj
    
    - name: Build
      run: dotnet build WorkWatcher/WorkWatcher.csproj -c Release --no-restore
    
    # 자체 포함형 단일 파일 (Framework 포함)
    - name: Publish Self-Contained
      run: |
        dotnet publish WorkWatcher/WorkWatcher.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          -o ./publish/self-contained
    
    # Framework 의존형 (더 작은 파일 크기)
    - name: Publish Framework-Dependent
      run: |
        dotnet publish WorkWatcher/WorkWatcher.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=true `
          -o ./publish/framework-dependent
    
    # ZIP 파일 생성
    - name: Create ZIP files
      run: |
        Compress-Archive -Path ./publish/self-contained/* -DestinationPath ./WorkWatcher-SelfContained-win-x64.zip
        Compress-Archive -Path ./publish/framework-dependent/* -DestinationPath ./WorkWatcher-FrameworkDependent-win-x64.zip
    
    # 버전 추출
    - name: Get version from tag
      id: get_version
      run: |
        $version = "${{ github.ref_name }}" -replace '^v', ''
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
    
    # GitHub Release 생성
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: WorkWatcher ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## WorkWatcher ${{ steps.get_version.outputs.VERSION }} 릴리스
          
          ### 📦설치 방법
          
          #### 옵션 1: 자체 포함형 (추천)
          - `WorkWatcher-SelfContained-win-x64.zip` 다운로드
          - .NET Runtime 설치 불필요
          - 파일 크기가 더 큼 (~80MB)
          
          #### 옵션 2: Framework 의존형
          - `WorkWatcher-FrameworkDependent-win-x64.zip` 다운로드
          - [.NET 8 Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) 필요
          - 파일 크기가 작음 (~1MB)
          
          ### 실행 방법
          1. ZIP 파일 압축 해제
          2. `WorkWatcher.exe` 실행
          
          ### 시스템 요구사항
          - Windows 10 (버전 1809) 이상 또는 Windows 11
          - x64 프로세서
          
          ### 변경 사항
          - 릴리즈함
        files: |
          WorkWatcher-SelfContained-win-x64.zip
          WorkWatcher-FrameworkDependent-win-x64.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}